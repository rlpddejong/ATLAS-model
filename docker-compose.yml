version: '3.8'

services:
  atlas-train:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas:latest
    container_name: atlas-training
    
    # GPU support
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
    
    # Mount volumes for data and outputs
    volumes:
      # Your dataset (adjust path as needed)
      - ./data:/app/data:ro
      
      # Output directories
      - ./outputs:/app/outputs
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      
      # Weights & Biases cache
      - ~/.wandb:/root/.wandb
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Keep container running
    stdin_open: true
    tty: true

  # Optional: Jupyter notebook service for experimentation
  atlas-jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: atlas:latest
    container_name: atlas-jupyter
    
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
    
    volumes:
      - ./:/app
      - ~/.wandb:/root/.wandb
    
    ports:
      - "8888:8888"
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    
    stdin_open: true
    tty: true
